name: Deploy Backend And Update Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "apps/**"
      - "frontend/**"
      - "shared/**"
      - "infra/terraform/**"
      - "Dockerfile"
      - "pyproject.toml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "apps/**"
              - "shared/**"
              - "Dockerfile"
              - "pyproject.toml"
            frontend:
              - "frontend/**"
            infra:
              - "infra/terraform/**"
              - ".github/workflows/**"

  deploy-backend:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.backend_url.outputs.backend_url }}
    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ vars.ECR_REPOSITORY_NAME }}" --region "${{ vars.AWS_REGION }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ vars.ECR_REPOSITORY_NAME }}" --region "${{ vars.AWS_REGION }}"

      - name: Import ECR into Terraform state (idempotent)
        working-directory: infra/terraform
        run: |
          terraform import -input=false \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="hf_api_token=${{ secrets.HF_API_TOKEN }}" \
            -var="kaggle_username=${{ secrets.KAGGLE_USERNAME }}" \
            -var="kaggle_key=${{ secrets.KAGGLE_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            aws_ecr_repository.api "${{ vars.ECR_REPOSITORY_NAME }}" || true

      - name: Resolve AWS account
        id: account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
        run: |
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.ECR_REPOSITORY_NAME }}"
          IMAGE_TAG="${{ vars.IMAGE_TAG }}"
          docker build -t "${{ vars.ECR_REPOSITORY_NAME }}:${IMAGE_TAG}" .
          docker tag "${{ vars.ECR_REPOSITORY_NAME }}:${IMAGE_TAG}" "${ECR_URI}:${IMAGE_TAG}"
          docker push "${ECR_URI}:${IMAGE_TAG}"

      - name: Terraform apply full stack
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve -lock-timeout=10m \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="service_name=${{ vars.SERVICE_NAME }}" \
            -var="ecr_repository_name=${{ vars.ECR_REPOSITORY_NAME }}" \
            -var="image_tag=${{ vars.IMAGE_TAG }}" \
            -var="deployment_target=${{ vars.DEPLOYMENT_TARGET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="hf_api_token=${{ secrets.HF_API_TOKEN }}" \
            -var="kaggle_username=${{ secrets.KAGGLE_USERNAME }}" \
            -var="kaggle_key=${{ secrets.KAGGLE_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_name=${{ vars.DB_NAME }}" \
            -var="db_username=${{ vars.DB_USERNAME }}" \
            -var="db_instance_class=${{ vars.DB_INSTANCE_CLASS }}" \
            -var="db_allocated_storage=${{ vars.DB_ALLOCATED_STORAGE }}" \
            -var="hf_provider=${{ vars.HF_PROVIDER }}" \
            -var="hf_timeout_seconds=${{ vars.HF_TIMEOUT_SECONDS }}" \
            -var="database_url=${{ vars.DATABASE_URL }}" \
            -var="redis_url=${{ vars.REDIS_URL }}" \
            -var="enable_rds=${{ vars.ENABLE_RDS }}" \
            -var="enable_cloudfront_https=${{ vars.ENABLE_CLOUDFRONT_HTTPS }}"

      - name: Read backend_url output
        id: backend_url
        working-directory: infra/terraform
        run: echo "backend_url=$(terraform output -raw backend_url)" >> "$GITHUB_OUTPUT"

      - name: Smoke test backend API
        env:
          BACKEND_URL: ${{ steps.backend_url.outputs.backend_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import sys
          import urllib.error
          import urllib.request

          base = os.environ.get("BACKEND_URL", "").rstrip("/")
          if not base:
              print("BACKEND_URL output is empty.")
              sys.exit(1)

          def request(path: str, method: str = "GET", body: dict | None = None, timeout: int = 60):
              data = None
              headers = {}
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(f"{base}{path}", data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.status, json.loads(resp.read().decode("utf-8"))

          def request_with_retry(path: str, method: str = "GET", body: dict | None = None, attempts: int = 12, timeout: int = 90):
              last_exc = None
              for attempt in range(1, attempts + 1):
                  try:
                      return request(path, method=method, body=body, timeout=timeout)
                  except urllib.error.HTTPError as exc:
                      # Retry on transient edge/origin readiness errors.
                      if exc.code in {502, 503, 504}:
                          last_exc = exc
                      else:
                          raise
                  except (urllib.error.URLError, TimeoutError) as exc:
                      last_exc = exc

                  wait_seconds = min(5 * attempt, 30)
                  print(f"Retrying {path} ({attempt}/{attempts}) after {wait_seconds}s: {last_exc}")
                  time.sleep(wait_seconds)

              raise last_exc if last_exc else RuntimeError(f"request failed for {path}")

          try:
              status, health = request_with_retry("/health")
              assert status == 200 and health.get("status") == "ok", "health check failed"

              status, models = request_with_retry("/v1/models")
              assert status == 200 and isinstance(models, list) and len(models) >= 1, "model list empty"

              status, pred = request_with_retry(
                  "/v1/predictions",
                  method="POST",
                  body={"input": "ModelMesh CI smoke test input", "routing_mode": "auto"},
                  attempts=6,
                  timeout=120,
              )
              assert status == 200 and pred.get("id") and pred.get("prediction"), "prediction response invalid"

              status, logs = request_with_retry("/v1/system/logs")
              assert status == 200 and isinstance(logs, list), "logs response invalid"
              pred_id = pred["id"]
              assert any(item.get("prediction_id") == pred_id for item in logs), "prediction log not persisted"
          except (AssertionError, urllib.error.HTTPError, urllib.error.URLError, TimeoutError) as exc:
              print(f"Smoke test failed: {exc}")
              sys.exit(1)

          print("Smoke test passed.")
          PY

  update-vercel:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-backend
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Resolve latest backend URL
        id: latest_backend
        working-directory: infra/terraform
        run: echo "backend_url=$(terraform output -raw backend_url)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Upsert Vercel production env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BACKEND_URL: ${{ steps.latest_backend.outputs.backend_url }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel env rm VITE_API_BASE_URL production --yes --token "$VERCEL_TOKEN" || true
          printf "%s" "$BACKEND_URL" | vercel env add VITE_API_BASE_URL production --token "$VERCEL_TOKEN"
          vercel env rm BACKEND_URL production --yes --token "$VERCEL_TOKEN" || true
          printf "%s" "$BACKEND_URL" | vercel env add BACKEND_URL production --token "$VERCEL_TOKEN"

      - name: Trigger Vercel production deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
