name: Deploy Backend And Update Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "apps/**"
      - "frontend/**"
      - "shared/**"
      - "infra/terraform/**"
      - "Dockerfile"
      - "pyproject.toml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "apps/**"
              - "shared/**"
              - "Dockerfile"
              - "pyproject.toml"
            frontend:
              - "frontend/**"
            infra:
              - "infra/terraform/**"
              - ".github/workflows/**"

  deploy-backend:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.backend_url.outputs.backend_url }}
      ec2_instance_id: ${{ steps.ec2_instance.outputs.ec2_instance_id }}
    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: ${{ vars.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ vars.ECR_REPOSITORY_NAME }}" --region "${{ vars.AWS_REGION }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ vars.ECR_REPOSITORY_NAME }}" --region "${{ vars.AWS_REGION }}"

      - name: Import ECR into Terraform state (idempotent)
        working-directory: infra/terraform
        run: |
          terraform import -input=false \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="hf_api_token=${{ secrets.HF_API_TOKEN }}" \
            -var="api_keys=${{ secrets.API_KEYS }}" \
            -var="kaggle_username=${{ secrets.KAGGLE_USERNAME }}" \
            -var="kaggle_key=${{ secrets.KAGGLE_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            aws_ecr_repository.api "${{ vars.ECR_REPOSITORY_NAME }}" || true

      - name: Resolve AWS account
        id: account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
        run: |
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.ECR_REPOSITORY_NAME }}"
          IMAGE_TAG="${{ vars.IMAGE_TAG }}"
          docker build -t "${{ vars.ECR_REPOSITORY_NAME }}:${IMAGE_TAG}" .
          docker tag "${{ vars.ECR_REPOSITORY_NAME }}:${IMAGE_TAG}" "${ECR_URI}:${IMAGE_TAG}"
          docker push "${ECR_URI}:${IMAGE_TAG}"

      - name: Terraform apply full stack
        env:
          DATABASE_URL_VAR: ${{ vars.DATABASE_URL }}
          REDIS_URL_VAR: ${{ vars.REDIS_URL }}
          ENABLE_RDS_VAR: ${{ vars.ENABLE_RDS }}
          ENABLE_CLOUDFRONT_HTTPS_VAR: ${{ vars.ENABLE_CLOUDFRONT_HTTPS }}
          ENABLE_MANAGED_REDIS_VAR: ${{ vars.ENABLE_MANAGED_REDIS }}
          ENABLE_LOCAL_REDIS_VAR: ${{ vars.ENABLE_LOCAL_REDIS }}
          EC2_INSTANCE_TYPE_VAR: ${{ vars.EC2_INSTANCE_TYPE }}
        working-directory: infra/terraform
        run: |
          DATABASE_URL="${DATABASE_URL_VAR:-sqlite:///./modelmesh.db}"
          REDIS_URL="${REDIS_URL_VAR:-}"
          ENABLE_RDS="${ENABLE_RDS_VAR:-false}"
          ENABLE_CLOUDFRONT_HTTPS="${ENABLE_CLOUDFRONT_HTTPS_VAR:-true}"
          ENABLE_MANAGED_REDIS="${ENABLE_MANAGED_REDIS_VAR:-false}"
          ENABLE_LOCAL_REDIS="${ENABLE_LOCAL_REDIS_VAR:-true}"
          EC2_INSTANCE_TYPE="${EC2_INSTANCE_TYPE_VAR:-t3.micro}"
          terraform apply -auto-approve -lock-timeout=10m \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="service_name=${{ vars.SERVICE_NAME }}" \
            -var="ecr_repository_name=${{ vars.ECR_REPOSITORY_NAME }}" \
            -var="image_tag=${{ vars.IMAGE_TAG }}" \
            -var="deployment_target=${{ vars.DEPLOYMENT_TARGET }}" \
            -var="allowed_origins=${{ vars.ALLOWED_ORIGINS }}" \
            -var="hf_api_token=${{ secrets.HF_API_TOKEN }}" \
            -var="kaggle_username=${{ secrets.KAGGLE_USERNAME }}" \
            -var="kaggle_key=${{ secrets.KAGGLE_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_name=${{ vars.DB_NAME }}" \
            -var="db_username=${{ vars.DB_USERNAME }}" \
            -var="db_instance_class=${{ vars.DB_INSTANCE_CLASS }}" \
            -var="db_allocated_storage=${{ vars.DB_ALLOCATED_STORAGE }}" \
            -var="hf_provider=${{ vars.HF_PROVIDER }}" \
            -var="hf_timeout_seconds=${{ vars.HF_TIMEOUT_SECONDS }}" \
            -var="database_url=${DATABASE_URL}" \
            -var="redis_url=${REDIS_URL}" \
            -var="enable_rds=${ENABLE_RDS}" \
            -var="enable_cloudfront_https=${ENABLE_CLOUDFRONT_HTTPS}" \
            -var="enable_managed_redis=${ENABLE_MANAGED_REDIS}" \
            -var="enable_local_redis=${ENABLE_LOCAL_REDIS}" \
            -var="ec2_instance_type=${EC2_INSTANCE_TYPE}"

      - name: Read backend_url output
        id: backend_url
        working-directory: infra/terraform
        run: echo "backend_url=$(terraform output -raw backend_url)" >> "$GITHUB_OUTPUT"

      - name: Read ec2_instance_id output
        id: ec2_instance
        working-directory: infra/terraform
        run: |
          value="$(terraform output -raw ec2_instance_id 2>/dev/null || true)"
          echo "ec2_instance_id=$value" >> "$GITHUB_OUTPUT"

      - name: Roll EC2 containers
        if: ${{ vars.DEPLOYMENT_TARGET == 'ec2' && steps.ec2_instance.outputs.ec2_instance_id != '' }}
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
          EC2_INSTANCE_ID: ${{ steps.ec2_instance.outputs.ec2_instance_id }}
          ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ vars.IMAGE_TAG }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          HF_PROVIDER: ${{ vars.HF_PROVIDER }}
          HF_TIMEOUT_SECONDS: ${{ vars.HF_TIMEOUT_SECONDS }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          API_KEYS: ${{ secrets.API_KEYS }}
        working-directory: infra/terraform
        run: |
          DATABASE_URL="$(terraform output -raw database_url)"
          REDIS_URL="$(terraform output -raw effective_redis_url)"
          DATASET_BUCKET_NAME="$(terraform output -raw dataset_bucket_name)"
          COMPARISON_QUEUE_URL="$(terraform output -raw comparison_queue_url)"
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY_NAME}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy latest ModelMesh containers" \
            --parameters commands="[
              \"set -euxo pipefail\",
              \"mkdir -p /opt/modelmesh\",
              \"mkdir -p /opt/modelmesh/data\",
              \"cat > /opt/modelmesh/.env <<'ENVVARS'\",
              \"HF_API_TOKEN=${HF_API_TOKEN}\",
              \"HF_PROVIDER=${HF_PROVIDER}\",
              \"HF_TIMEOUT_SECONDS=${HF_TIMEOUT_SECONDS}\",
              \"DATABASE_URL=${DATABASE_URL}\",
              \"REDIS_URL=${REDIS_URL}\",
              \"DATASET_BUCKET=${DATASET_BUCKET_NAME}\",
              \"COMPARISON_QUEUE_URL=${COMPARISON_QUEUE_URL}\",
              \"ALLOWED_ORIGINS=${ALLOWED_ORIGINS}\",
              \"AWS_REGION=${AWS_REGION}\",
              \"KAGGLE_USERNAME=${KAGGLE_USERNAME}\",
              \"KAGGLE_KEY=${KAGGLE_KEY}\",
              \"API_KEYS=${API_KEYS}\",
              \"ENVVARS\",
              \"aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com\",
              \"if [ \\\"${REDIS_URL}\\\" = \\\"redis://127.0.0.1:6379/0\\\" ]; then docker rm -f modelmesh-redis || true; docker run -d --name modelmesh-redis --restart unless-stopped -p 127.0.0.1:6379:6379 redis:7-alpine; fi\",
              \"docker pull ${ECR_URI}:${IMAGE_TAG}\",
              \"docker rm -f modelmesh-api || true\",
              \"docker rm -f modelmesh-worker || true\",
              \"docker run -d --name modelmesh-api --restart unless-stopped --env-file /opt/modelmesh/.env -v /opt/modelmesh/data:/opt/modelmesh/data -p 80:8000 ${ECR_URI}:${IMAGE_TAG}\",
              \"docker run -d --name modelmesh-worker --restart unless-stopped --env-file /opt/modelmesh/.env -v /opt/modelmesh/data:/opt/modelmesh/data ${ECR_URI}:${IMAGE_TAG} python -m apps.worker.main\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID"
          STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$EC2_INSTANCE_ID" --query "Status" --output text)
          test "$STATUS" = "Success"

      - name: Smoke test backend API
        env:
          BACKEND_URL: ${{ steps.backend_url.outputs.backend_url }}
          APP_API_KEY: ${{ vars.FRONTEND_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import sys
          import urllib.error
          import urllib.request

          base = os.environ.get("BACKEND_URL", "").rstrip("/")
          if not base:
              print("BACKEND_URL output is empty.")
              sys.exit(1)

          def request(path: str, method: str = "GET", body: dict | None = None, timeout: int = 60):
              data = None
              headers = {}
              api_key = os.environ.get("APP_API_KEY", "").strip() or "modelmesh-demo-key"
              if api_key:
                  headers["X-API-Key"] = api_key
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(f"{base}{path}", data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.status, json.loads(resp.read().decode("utf-8"))

          def request_with_retry(path: str, method: str = "GET", body: dict | None = None, attempts: int = 12, timeout: int = 90):
              last_exc = None
              for attempt in range(1, attempts + 1):
                  try:
                      return request(path, method=method, body=body, timeout=timeout)
                  except urllib.error.HTTPError as exc:
                      # Retry on transient edge/origin readiness errors.
                      if exc.code in {502, 503, 504}:
                          last_exc = exc
                      else:
                          raise
                  except (urllib.error.URLError, TimeoutError) as exc:
                      last_exc = exc

                  wait_seconds = min(5 * attempt, 30)
                  print(f"Retrying {path} ({attempt}/{attempts}) after {wait_seconds}s: {last_exc}")
                  time.sleep(wait_seconds)

              raise last_exc if last_exc else RuntimeError(f"request failed for {path}")

          try:
              status, health = request_with_retry("/health")
              assert status == 200 and health.get("status") == "ok", "health check failed"

              status, models = request_with_retry("/v1/models")
              assert status == 200 and isinstance(models, list) and len(models) >= 1, "model list empty"

              status, pred = request_with_retry(
                  "/v1/predictions",
                  method="POST",
                  body={"input": "ModelMesh CI smoke test input", "routing_mode": "auto"},
                  attempts=6,
                  timeout=120,
              )
              assert status == 200 and pred.get("id") and pred.get("prediction"), "prediction response invalid"

              status, logs = request_with_retry("/v1/system/logs")
              assert status == 200 and isinstance(logs, list), "logs response invalid"
              pred_id = pred["id"]
              assert any(item.get("prediction_id") == pred_id for item in logs), "prediction log not persisted"
          except (AssertionError, urllib.error.HTTPError, urllib.error.URLError, TimeoutError) as exc:
              print(f"Smoke test failed: {exc}")
              sys.exit(1)

          print("Smoke test passed.")
          PY

  update-vercel:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-backend
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.infra == 'true') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Resolve latest backend URL
        id: latest_backend
        working-directory: infra/terraform
        run: echo "backend_url=$(terraform output -raw backend_url)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Upsert Vercel production env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BACKEND_URL: ${{ steps.latest_backend.outputs.backend_url }}
          FRONTEND_API_KEY: ${{ vars.FRONTEND_API_KEY }}
        run: |
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel env rm VITE_API_BASE_URL production --yes --token "$VERCEL_TOKEN" || true
          printf "%s" "$BACKEND_URL" | vercel env add VITE_API_BASE_URL production --token "$VERCEL_TOKEN"
          vercel env rm BACKEND_URL production --yes --token "$VERCEL_TOKEN" || true
          printf "%s" "$BACKEND_URL" | vercel env add BACKEND_URL production --token "$VERCEL_TOKEN"
          KEY_VALUE="${FRONTEND_API_KEY:-modelmesh-demo-key}"
          vercel env rm VITE_API_KEY production --yes --token "$VERCEL_TOKEN" || true
          printf "%s" "$KEY_VALUE" | vercel env add VITE_API_KEY production --token "$VERCEL_TOKEN"

      - name: Trigger Vercel production deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"
